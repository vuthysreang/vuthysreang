<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vuthy SREANG · Full-Stack Web Developer</title>
  <meta name="description" content="Vuthy SREANG (Zevo) — Full-Stack Web Developer. Interactive profile." />
  <style>
    :root {
      --forest-0: #081c10;
      --forest-1: #1b4332;
      --forest-2: #2d6a4f;
      --leaf: #52b788;
      --mint: #95d5b2;
      --pale: #d8f3dc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 50% 30%, var(--forest-2), var(--forest-1) 45%, var(--forest-0) 100%);
      color: var(--pale);
      overflow-x: hidden;
    }
    /* particle canvas sits behind everything and reacts to the mouse */
    #tsparticles {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .badge {
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mint);
      border: 1px solid rgba(149, 213, 178, 0.4);
      border-radius: 999px;
      padding: 6px 16px;
      margin-bottom: 22px;
      backdrop-filter: blur(2px);
    }
    h1 {
      font-size: clamp(2.4rem, 7vw, 4.6rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 0 24px rgba(82, 183, 136, 0.55);
    }
    .tagline {
      margin-top: 12px;
      font-size: clamp(1rem, 2.4vw, 1.4rem);
      color: var(--mint);
      letter-spacing: 1px;
    }
    .hint {
      margin-top: 10px;
      font-size: 0.85rem;
      color: rgba(216, 243, 220, 0.6);
    }
    .links {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }
    .links a {
      text-decoration: none;
      color: var(--pale);
      border: 1px solid rgba(149, 213, 178, 0.45);
      border-radius: 12px;
      padding: 11px 20px;
      font-weight: 600;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      background: rgba(27, 67, 50, 0.35);
    }
    .links a:hover {
      transform: translateY(-3px);
      background: var(--leaf);
      color: var(--forest-0);
      box-shadow: 0 8px 24px rgba(82, 183, 136, 0.4);
    }
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 18px;
      font-size: 0.8rem;
      color: rgba(216, 243, 220, 0.55);
    }
  </style>
</head>
<body>
  <div id="tsparticles"></div>

  <main class="stage">
    <span class="badge">🌲 Full-Stack Web Developer</span>
    <h1>Vuthy SREANG</h1>
    <p class="tagline">Front-End · Back-End · DevOps — A.K.A Zevo</p>
    <p class="hint">✨ Move your mouse — the forest reacts. Click to plant more. ✨</p>

    <nav class="links">
      <a href="https://github.com/vuthysreang" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.linkedin.com/in/vuthy-sreang/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://www.facebook.com/VuthySREANG.me/" target="_blank" rel="noopener">Facebook</a>
      <a href="mailto:vuthysreang.zevo@gmail.com">Email</a>
    </nav>
  </main>

  <footer>🌱 Built with tsParticles · Move &amp; click anywhere</footer>

  <script src="https://cdn.jsdelivr.net/npm/@tsparticles/all@3/tsparticles.all.bundle.min.js"></script>
  <script>
    tsParticles.load({
      id: "tsparticles",
      options: {
        fpsLimit: 60,
        background: { color: "transparent" },
        particles: {
          number: { value: 90, density: { enable: true, area: 900 } },
          color: { value: ["#52b788", "#95d5b2", "#74c69d", "#d8f3dc"] },
          links: {
            enable: true,
            distance: 140,
            color: "#52b788",
            opacity: 0.35,
            width: 1
          },
          move: {
            enable: true,
            speed: 1.1,
            direction: "none",
            outModes: { default: "out" }
          },
          opacity: { value: { min: 0.3, max: 0.8 } },
          size: { value: { min: 1, max: 3.5 } }
        },
        interactivity: {
          events: {
            onHover: { enable: true, mode: "grab" },
            onClick: { enable: true, mode: "push" }
          },
          modes: {
            grab: { distance: 180, links: { opacity: 0.7, color: "#95d5b2" } },
            push: { quantity: 4 }
          }
        },
        detectRetina: true
      }
    });
  </script>
</body>
</html>
