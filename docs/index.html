<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vuthy SREANG · Full-Stack Web Developer</title>
  <meta name="description" content="Vuthy SREANG (Zevo) — Full-Stack Web Developer. Interactive profile with a falling-leaves background." />
  <style>
    :root {
      --forest-0: #081c10;
      --forest-1: #1b4332;
      --forest-2: #2d6a4f;
      --leaf: #52b788;
      --mint: #95d5b2;
      --pale: #d8f3dc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 50% 28%, var(--forest-2), var(--forest-1) 45%, var(--forest-0) 100%);
      color: var(--pale);
      overflow-x: hidden;
    }
    /* leaf canvas sits behind everything and reacts to the mouse */
    #tsparticles { position: fixed; inset: 0; z-index: 0; }
    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .badge {
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mint);
      border: 1px solid rgba(149, 213, 178, 0.4);
      border-radius: 999px;
      padding: 6px 16px;
      margin-bottom: 22px;
      backdrop-filter: blur(2px);
    }
    h1 {
      font-size: clamp(2.4rem, 7vw, 4.6rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 0 24px rgba(82, 183, 136, 0.55);
    }
    /* typing headline */
    .typed-wrap {
      margin-top: 14px;
      min-height: 2.1em;
      font-size: clamp(1.05rem, 2.6vw, 1.5rem);
      color: var(--mint);
      letter-spacing: 1px;
      font-weight: 600;
    }
    #typed { white-space: pre; }
    .caret {
      display: inline-block;
      width: 3px;
      height: 1.05em;
      background: var(--leaf);
      margin-left: 3px;
      vertical-align: text-bottom;
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .hint {
      margin-top: 14px;
      font-size: 0.85rem;
      color: rgba(216, 243, 220, 0.6);
    }
    .links {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }
    .links a {
      text-decoration: none;
      color: var(--pale);
      border: 1px solid rgba(149, 213, 178, 0.45);
      border-radius: 12px;
      padding: 11px 20px;
      font-weight: 600;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      background: rgba(27, 67, 50, 0.35);
    }
    .links a:hover {
      transform: translateY(-3px);
      background: var(--leaf);
      color: var(--forest-0);
      box-shadow: 0 8px 24px rgba(82, 183, 136, 0.4);
    }
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 18px;
      font-size: 0.8rem;
      color: rgba(216, 243, 220, 0.55);
    }
  </style>
</head>
<body>
  <div id="tsparticles"></div>

  <main class="stage">
    <span class="badge">🌲 Full-Stack Web Developer</span>
    <h1>Vuthy SREANG</h1>
    <div class="typed-wrap"><span id="typed"></span><span class="caret"></span></div>
    <p class="hint">🍃 Move your mouse — the leaves scatter. Click to drop more. 🍃</p>

    <nav class="links">
      <a href="https://github.com/vuthysreang" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.linkedin.com/in/vuthy-sreang/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://www.facebook.com/VuthySREANG.me/" target="_blank" rel="noopener">Facebook</a>
      <a href="mailto:vuthysreang.zevo@gmail.com">Email</a>
    </nav>
  </main>

  <footer>🌱 Falling leaves built with tsParticles · Move &amp; click anywhere</footer>

  <!-- Typing headline (vanilla, code-point safe) -->
  <script>
    (function () {
      const phrases = [
        "Front-End · Back-End · DevOps",
        "Building full-stack web apps 🚀",
        "Build · Learn · Repeat 🌲",
        "A.K.A Zevo 😎"
      ];
      const el = document.getElementById("typed");
      let p = 0, i = 0, deleting = false;
      function tick() {
        const chars = Array.from(phrases[p]);
        el.textContent = chars.slice(0, i).join("");
        if (!deleting) {
          if (i < chars.length) { i++; setTimeout(tick, 85); }
          else { deleting = true; setTimeout(tick, 1500); }
        } else {
          if (i > 0) { i--; setTimeout(tick, 40); }
          else { deleting = false; p = (p + 1) % phrases.length; setTimeout(tick, 350); }
        }
      }
      tick();
    })();
  </script>

  <!-- Falling, mouse-reactive leaves -->
  <script src="https://cdn.jsdelivr.net/npm/@tsparticles/all@3/tsparticles.all.bundle.min.js"></script>
  <script>
    tsParticles.load({
      id: "tsparticles",
      options: {
        fpsLimit: 60,
        background: { color: "transparent" },
        particles: {
          number: { value: 60, density: { enable: true, area: 800 } },
          shape: {
            type: "emoji",
            options: { emoji: { value: ["🍃", "🌿", "🍂", "🍁"] } }
          },
          opacity: { value: { min: 0.6, max: 1 } },
          size: { value: { min: 12, max: 26 } },
          move: {
            enable: true,
            direction: "bottom",
            speed: { min: 1, max: 3 },
            straight: false,
            outModes: { default: "out" },
            gravity: { enable: true, acceleration: 2 }
          },
          rotate: {
            value: { min: 0, max: 360 },
            direction: "random",
            animation: { enable: true, speed: 10 }
          },
          wobble: {
            enable: true,
            distance: 28,
            speed: { min: -10, max: 10 }
          },
          tilt: {
            enable: true,
            value: { min: 0, max: 360 },
            direction: "random",
            animation: { enable: true, speed: 25 }
          }
        },
        interactivity: {
          events: {
            onHover: { enable: true, mode: "repulse" },
            onClick: { enable: true, mode: "push" }
          },
          modes: {
            repulse: { distance: 140, duration: 0.6 },
            push: { quantity: 5 }
          }
        },
        detectRetina: true
      }
    });
  </script>
</body>
</html>
